name: bun action
description: Simple bun composite action
inputs:
  who-to-greet:
    description: Provide the name who to greet in the logs
    required: true
    # default does not work with required: true
outputs:
  time:
    description: The time that you were greeted
runs:
  using: 'composite'
  steps:
    - name: Setup bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install
      shell: bash
      working-directory: ${{ github.action_path }}

    - name: Run main script
      run: bun run ${{ github.action_path }}/index.ts
      shell: bash
